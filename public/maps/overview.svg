<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="field1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="field2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- Grid lines (GIS style) -->
  <g stroke="#1d4ed8" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>
  <!-- Rice fields (green patches) -->
  <rect x="80" y="120" width="280" height="180" rx="4" fill="url(#field1)" opacity="0.7"/>
  <rect x="400" y="80" width="240" height="220" rx="4" fill="url(#field2)" opacity="0.65"/>
  <rect x="700" y="150" width="320" height="160" rx="4" fill="url(#field1)" opacity="0.6"/>
  <rect x="1080" y="100" width="260" height="240" rx="4" fill="url(#field2)" opacity="0.7"/>
  <rect x="1380" y="130" width="180" height="200" rx="4" fill="url(#field1)" opacity="0.6"/>
  <rect x="60" y="400" width="200" height="280" rx="4" fill="url(#field2)" opacity="0.65"/>
  <rect x="320" y="430" width="360" height="220" rx="4" fill="url(#field1)" opacity="0.6"/>
  <rect x="740" y="380" width="280" height="260" rx="4" fill="url(#field2)" opacity="0.7"/>
  <rect x="1100" y="420" width="320" height="240" rx="4" fill="url(#field1)" opacity="0.65"/>
  <rect x="1480" y="400" width="120" height="300" rx="4" fill="url(#field2)" opacity="0.6"/>
  <!-- River -->
  <path d="M 0 340 Q 300 360 500 320 Q 700 280 900 350 Q 1100 420 1300 380 Q 1500 340 1600 360" 
        fill="none" stroke="#3b82f6" stroke-width="18" opacity="0.6"/>
  <path d="M 0 340 Q 300 360 500 320 Q 700 280 900 350 Q 1100 420 1300 380 Q 1500 340 1600 360" 
        fill="none" stroke="#60a5fa" stroke-width="8" opacity="0.4"/>
  <!-- Roads -->
  <line x1="0" y1="450" x2="1600" y2="450" stroke="#fbbf24" stroke-width="4" opacity="0.5" stroke-dasharray="20,10"/>
  <line x1="650" y1="0" x2="700" y2="900" stroke="#fbbf24" stroke-width="3" opacity="0.4" stroke-dasharray="15,8"/>
  <!-- Village clusters (boundary polygons) -->
  <polygon points="200,200 400,180 450,280 380,340 200,320" 
           fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="8,4"/>
  <polygon points="520,220 720,200 760,310 680,370 500,350" 
           fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="8,4"/>
  <polygon points="850,180 1050,160 1100,280 1020,340 840,320" 
           fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="8,4"/>
  <polygon points="1180,190 1380,170 1420,290 1340,350 1160,330" 
           fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="8,4"/>
  <polygon points="150,500 350,480 380,590 300,640 140,620" 
           fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="8,4"/>
  <polygon points="430,510 630,490 660,600 580,650 420,630" 
           fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="8,4"/>
  <polygon points="760,500 960,480 990,600 910,650 750,630" 
           fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="8,4"/>
  <polygon points="1060,510 1260,490 1290,600 1210,650 1050,630" 
           fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="8,4"/>
  <!-- Village labels -->
  <text x="310" y="268" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">Thôn Ngoại</text>
  <text x="630" y="285" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">Thôn Nội</text>
  <text x="960" y="268" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">Thôn Đình</text>
  <text x="1290" y="268" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">Thôn Chùa</text>
  <text x="255" y="567" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">Thôn Đoài</text>
  <text x="540" y="570" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">Thôn Bắc</text>
  <text x="870" y="567" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">Thôn Trung</text>
  <text x="1170" y="567" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">Thôn Nam</text>
  <!-- Compass rose -->
  <g transform="translate(1520, 80)">
    <circle cx="0" cy="0" r="40" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="-22" font-family="sans-serif" font-size="12" font-weight="bold" fill="#93c5fd" text-anchor="middle">N</text>
    <text x="0" y="32" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle">S</text>
    <text x="28" y="5" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle">E</text>
    <text x="-28" y="5" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle">W</text>
    <polygon points="0,-18 4,0 0,5 -4,0" fill="#3b82f6"/>
    <polygon points="0,18 4,0 0,-5 -4,0" fill="#475569"/>
  </g>
  <!-- Title -->
  <rect x="20" y="20" width="420" height="60" rx="8" fill="#0f172a" opacity="0.85"/>
  <text x="40" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#93c5fd">BẢN ĐỒ HÀNH CHÍNH</text>
  <text x="40" y="65" font-family="sans-serif" font-size="12" fill="#64748b">Hệ Thống Bản Đồ Thôn Xã — UBND</text>
  <!-- Scale bar -->
  <g transform="translate(40, 840)">
    <rect x="0" y="0" width="100" height="6" fill="#3b82f6" opacity="0.7"/>
    <rect x="100" y="0" width="100" height="6" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <text x="0" y="20" font-family="sans-serif" font-size="10" fill="#64748b">0</text>
    <text x="95" y="20" font-family="sans-serif" font-size="10" fill="#64748b">500m</text>
    <text x="190" y="20" font-family="sans-serif" font-size="10" fill="#64748b">1km</text>
  </g>
</svg>
